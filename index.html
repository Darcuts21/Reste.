<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reste.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ff9d; --bg: #000000; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top left, #0a0a0a, #000);
            @apply text-white antialiased min-h-screen overflow-x-hidden; 
        }

        /* Effet Verre Premium */
        .glass { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .post-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            @apply rounded-[2rem] p-6 transition-all duration-500;
        }

        /* États des onglets */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* XP & Progression */
        .xp-glow { box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .scroll-hide::-webkit-scrollbar { display: none; }
        
        /* Bouton Premium */
        .btn-primary {
            @apply bg-white text-black py-5 rounded-[1.8rem] font-extrabold text-sm uppercase tracking-tighter transition-all active:scale-95 disabled:opacity-50;
        }
    </style>
</head>
<body class="pb-36">

    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-xl border-b border-white/5">
        <span class="text-3xl font-extrabold tracking-tighter uppercase italic">Reste<span class="text-emerald-500">.</span></span>
        <div id="auth-status" class="flex items-center gap-3"></div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-32">
        
        <section id="tab-explore" class="tab-content active space-y-10">
            <header>
                <h2 class="text-5xl font-extrabold tracking-tight leading-[0.9]">Zéro <br><span class="text-zinc-600 font-medium tracking-normal">gaspillage.</span></h2>
            </header>

            <div class="glass p-2 rounded-[2.5rem]">
                <div class="flex flex-col p-6 space-y-5">
                    <input type="text" id="ing-input" placeholder="Oignons, pain sec, restes..." 
                           class="bg-transparent text-xl font-semibold outline-none w-full border-b border-white/10 pb-4 focus:border-emerald-500 transition-all">
                    <button id="ia-btn" class="btn-primary">Publier ma recette 🪄</button>
                </div>
            </div>

            <div id="posts-feed" class="space-y-6">
                </div>
        </section>

        <section id="tab-profile" class="tab-content space-y-8">
            <div class="flex flex-col items-center text-center space-y-4 py-4">
                <div id="profile-avatar" class="relative group"></div>
                <div>
                    <h2 id="profile-name" class="text-4xl font-extrabold tracking-tighter italic uppercase">Chargement...</h2>
                    <p id="level-name" class="text-emerald-500 text-[10px] font-black uppercase tracking-[0.3em] bg-emerald-500/10 px-4 py-1.5 rounded-full inline-block mt-3">NIVEAU 1</p>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] space-y-4">
                <div class="flex justify-between items-end">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-40">Maîtrise Culinaire</span>
                    <span id="xp-text" class="text-xs font-bold text-emerald-400">0 / 100 XP</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="xp-fill" class="xp-glow h-full bg-emerald-500 transition-all duration-1000"></div>
                </div>
            </div>

            <div class="space-y-6">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 px-2">Personnalisation de l'avatar</p>
                <div id="avatar-selection" class="flex gap-4 overflow-x-auto scroll-hide pb-4"></div>
            </div>

            <div id="my-posts-feed" class="space-y-6 border-t border-white/5 pt-10"></div>
            
            <button id="logout-btn" class="w-full py-10 text-zinc-700 font-bold text-[10px] uppercase tracking-[0.4em] hover:text-red-500 transition-all italic">
                — Déconnexion du compte
            </button>
        </section>
    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[260px] glass p-2 rounded-full flex justify-between z-50 shadow-2xl">
        <button onclick="window.switchTab('explore')" id="nav-explore" class="w-28 py-4 rounded-full bg-white text-black flex justify-center transition-all shadow-xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
        </button>
        <button onclick="window.switchTab('profile')" id="nav-profile" class="w-28 py-4 rounded-full text-white/20 flex justify-center transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </button>
    </nav>

    <div id="share-toast" class="hidden"></div>

    <div id="login-modal" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-sm text-center">
            <h3 class="text-6xl font-black mb-12 tracking-tighter italic uppercase">Reste<span class="text-emerald-500">.</span></h3>
            <div class="space-y-4">
                <input type="text" id="user-name-input" placeholder="Ton pseudo" 
                   class="w-full bg-white/5 p-6 rounded-[2rem] border border-white/10 outline-none text-center font-bold text-xl focus:border-emerald-500 transition-all">
                <button id="login-btn" class="w-full bg-emerald-500 text-black py-6 rounded-[2rem] font-black uppercase tracking-tighter shadow-xl shadow-emerald-500/20">
                    Rejoindre
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TA CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAx8-qibToAur16FIWLd_Yc9HXQlwJoe3A",
            authDomain: "reste-95f7b.firebaseapp.com",
            projectId: "reste-95f7b",
            storageBucket: "reste-95f7b.firebasestorage.app",
            messagingSenderId: "667568129281",
            appId: "1:667568129281:web:654983ebc9db3f5e5d4700",
            measurementId: "G-HW49R782RD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LEVELS = [
            { min: 0, name: "Mitron", icon: "🥚", style: "avataaars" },
            { min: 100, name: "Commis", icon: "🔪", style: "bottts" },
            { min: 250, name: "Chef de Partie", icon: "👨‍🍳", style: "adventurer" },
            { min: 500, name: "Maître", icon: "🌟", style: "lorelei" }
        ];

        window.userXP = 0;
        window.userStyle = 'avataaars';
        const currentUser = localStorage.getItem('reste_user');

        if (!currentUser) document.getElementById('login-modal').classList.remove('hidden');
        else initApp();

        async function initApp() {
            // Profil Cloud
            onSnapshot(doc(db, "users", currentUser), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    window.userXP = data.xp || 0;
                    window.userStyle = data.style || 'avataaars';
                    updateUserUI(data);
                    renderAvatarEditor();
                }
            });

            // Flux en Temps Réel
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderFeed('posts-feed', posts);
                renderFeed('my-posts-feed', posts.filter(p => p.author === currentUser));
            });
        }

        document.getElementById('login-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if(!name) return;
            const userRef = doc(db, "users", name);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) await setDoc(userRef, { name, xp: 0, style: 'avataaars' });
            localStorage.setItem('reste_user', name);
            location.reload();
        };

        document.getElementById('ia-btn').onclick = async () => {
            const input = document.getElementById('ing-input');
            const btn = document.getElementById('ia-btn');
            if(!input.value.trim() || btn.disabled) return;
            
            btn.disabled = true;
            btn.innerText = "IA en action...";

            try {
                await addDoc(collection(db, "posts"), {
                    author: currentUser,
                    content: `Recette : ${input.value}. Poêlée express au paprika, échalotes et touche de crème.`,
                    style: window.userStyle,
                    createdAt: serverTimestamp()
                });

                await updateDoc(doc(db, "users", currentUser), { xp: window.userXP + 25 });
                input.value = '';
                showToast("+25 XP ! Recette partagée.");
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "Publier ma recette 🪄";
            }
        };

        window.deletePost = async (id) => {
            if(confirm("Supprimer cette recette ?")) await deleteDoc(doc(db, "posts", id));
        };

        window.changeAvatarStyle = async (newStyle) => {
            await updateDoc(doc(db, "users", currentUser), { style: newStyle });
        };

        function updateUserUI(data) {
            const info = [...LEVELS].reverse().find(l => (data.xp || 0) >= l.min);
            const next = LEVELS.find(l => l.min > (data.xp || 0)) || { min: (data.xp || 0) + 100 };
            const progress = (((data.xp || 0) - info.min) / (next.min - info.min)) * 100;
            const url = `https://api.dicebear.com/7.x/${data.style}/svg?seed=${currentUser}`;

            document.getElementById('auth-status').innerHTML = `<img src="${url}" class="w-10 h-10 rounded-full bg-white/5 border border-white/10">`;
            document.getElementById('profile-name').innerText = data.name;
            document.getElementById('profile-avatar').innerHTML = `<img src="${url}" class="w-32 h-32 rounded-[3.5rem] bg-white/5 p-2 shadow-2xl border border-white/10">`;
            document.getElementById('level-name').innerText = info.name;
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('xp-text').innerText = `${data.xp || 0} / ${next.min} XP`;
        }

        function renderFeed(id, data) {
            const container = document.getElementById(id);
            container.innerHTML = data.map(post => `
                <div class="post-card">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-3">
                            <img src="https://api.dicebear.com/7.x/${post.style || 'avataaars'}/svg?seed=${post.author}" class="w-10 h-10 rounded-2xl bg-white/5 border border-white/10">
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest">${post.author}</p>
                                <p class="text-[8px] opacity-30 uppercase font-bold">Chef Certifié</p>
                            </div>
                        </div>
                        ${post.author === currentUser ? `<button onclick="deletePost('${post.id}')" class="opacity-30 hover:opacity-100 hover:text-red-500 transition-all p-2">🗑️</button>` : ''}
                    </div>
                    <p class="text-lg font-medium leading-tight text-white/90">${post.content}</p>
                </div>
            `).join('');
        }

        function renderAvatarEditor() {
            let html = '';
            LEVELS.forEach(level => {
                const isLocked = window.userXP < level.min;
                html += `
                    <div onclick="${isLocked ? '' : `window.changeAvatarStyle('${level.style}')`}" class="flex-shrink-0 cursor-pointer">
                        <img src="https://api.dicebear.com/7.x/${level.style}/svg?seed=${currentUser}" 
                             class="w-20 h-20 rounded-[2.5rem] bg-white/5 p-2 border-2 ${window.userStyle === level.style ? 'border-emerald-500' : 'border-transparent'} ${isLocked ? 'grayscale opacity-10' : ''}">
                        ${isLocked ? `<p class="text-[6px] text-center mt-2 font-bold opacity-30 uppercase">${level.min} XP</p>` : ''}
                    </div>`;
            });
            document.getElementById('avatar-selection').innerHTML = html;
        }

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            const exploreBtn = document.getElementById('nav-explore');
            const profileBtn = document.getElementById('nav-profile');

            if(tabId === 'explore') {
                exploreBtn.className = "w-28 py-4 rounded-full bg-white text-black flex justify-center transition-all shadow-xl";
                profileBtn.className = "w-28 py-4 rounded-full text-white/20 flex justify-center transition-all";
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                profileBtn.className = "w-28 py-4 rounded-full bg-white text-black flex justify-center transition-all shadow-xl";
                exploreBtn.className = "w-28 py-4 rounded-full text-white/20 flex justify-center transition-all";
            }
        };

        function showToast(m) { 
            const t = document.getElementById('share-toast'); 
            t.innerText = m; 
            t.className = "fixed bottom-32 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-full font-black text-[10px] uppercase tracking-[0.2em] z-[100] border-emerald-500/50"; 
            setTimeout(() => t.className = "hidden", 3000); 
        }

        document.getElementById('logout-btn').onclick = () => { if(confirm("Se déconnecter ?")) { localStorage.clear(); location.reload(); }};
    </script>
</body>
</html>
