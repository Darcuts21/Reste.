<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTE • Social Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURATION (À REMPLIR)
        const firebaseConfig = {
            apiKey: "AIzaSyBpyPQTpsrUGNARtsNgc9db5JSr2nFQV0U",
            authDomain: "ton-projet.firebaseapp.com",
            projectId: "ton-projet",
            storageBucket: "ton-projet.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:12345"
        };
        const GEMINI_API_KEY = "TA_CLE_GEMINI";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- AUTHENTIFICATION ---
        window.login = () => signInWithPopup(auth, provider);
        
        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('auth-btn');
            if (user) {
                btn.innerHTML = `<img src="${user.photoURL}" class="w-8 h-8 rounded-full">`;
                document.getElementById('user-welcome').innerText = `Salut, ${user.displayName.split(' ')[0]} !`;
            } else {
                btn.innerHTML = `<button onclick="login()" class="text-xs font-bold bg-zinc-100 px-3 py-1 rounded-full text-black">Connexion</button>`;
            }
        });

        // --- IA GEMINI ---
        window.askIA = async () => {
            const ing = document.getElementById('ing-input').value;
            if (!ing || !auth.currentUser) return alert("Connecte-toi et entre des ingrédients !");

            const btn = document.getElementById('ia-submit');
            btn.innerText = "⏳";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `En tant que chef anti-gaspi, propose une recette courte avec ces restes : ${ing}. Format : Titre, puis 3 étapes courtes.` }]}]
                    })
                });
                const data = await response.json();
                const recipeText = data.candidates[0].content.parts[0].text;

                // Sauvegarde automatique dans le flux social (Firestore)
                await addDoc(collection(db, "posts"), {
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    ingredients: ing,
                    recipe: recipeText,
                    createdAt: new Date()
                });

                document.getElementById('ing-input').value = "";
                btn.innerText = "🪄";
            } catch (e) { console.error(e); btn.innerText = "❌"; }
        };

        // --- FLUX SOCIAL TEMPS RÉEL ---
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('posts-list');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                container.innerHTML += `
                    <div class="mb-8 border-b dark:border-zinc-800 pb-6 animate-fade-in">
                        <div class="flex items-center px-4 py-3 space-x-3">
                            <img src="${post.userPhoto}" class="w-8 h-8 rounded-full">
                            <span class="text-sm font-semibold">${post.userName}</span>
                        </div>
                        <div class="px-4 py-6 bg-zinc-50 dark:bg-zinc-900 mx-4 rounded-3xl">
                            <p class="text-[10px] uppercase tracking-widest opacity-50 mb-2 italic">Restes : ${post.ingredients}</p>
                            <div class="text-sm whitespace-pre-line">${post.recipe}</div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white dark:bg-black text-black dark:text-white pb-24">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-black/80 ios-blur px-6 py-4 flex justify-between items-center border-b dark:border-zinc-800">
        <h1 class="text-xl font-bold italic tracking-tighter">Reste.</h1>
        <div id="auth-btn"></div>
    </nav>

    <main class="max-w-md mx-auto">
        
        <div class="p-6">
            <h2 id="user-welcome" class="text-2xl font-semibold">Bienvenue !</h2>
            <p class="text-sm opacity-50">L'IA cuisine tes restes, la communauté s'inspire.</p>
        </div>

        <div class="px-6 mb-8">
            <div class="bg-black text-white dark:bg-white dark:text-black p-6 rounded-[32px] shadow-xl">
                <p class="text-xs uppercase tracking-widest opacity-60 mb-3">Vide ton frigo</p>
                <div class="flex flex-col space-y-3">
                    <input type="text" id="ing-input" placeholder="Ex: 2 oeufs, yaourt périmé..." 
                           class="bg-transparent border-b border-white/20 dark:border-black/20 py-2 outline-none text-lg">
                    <button id="ia-submit" onclick="askIA()" class="bg-emerald-500 text-white py-3 rounded-2xl font-bold mt-2 active:scale-95 transition-transform">
                        Générer la recette 🪄
                    </button>
                </div>
            </div>
        </div>

        <div id="posts-list" class="space-y-4">
            <div class="text-center py-20 opacity-20 text-xs uppercase tracking-widest">Chargement du flux...</div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-black border-t dark:border-zinc-800 flex justify-around items-center py-4 ios-blur">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.97 2.59a1.5 1.5 0 00-1.94 0l-7.5 6.363A1.5 1.5 0 003 10.097V19.5A1.5 1.5 0 004.5 21h4.75a.75.75 0 00.75-.75V14h4v6.25c0 .414.336.75.75.75h4.75a1.5 1.5 0 001.5-1.5v-9.403a1.5 1.5 0 00-.53-1.144l-7.5-6.363z"></path></svg>
        <svg class="w-6 h-6 opacity-30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <svg class="w-6 h-6 opacity-30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    </div>

</body>
</html>
