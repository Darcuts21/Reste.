<!DOCTYPE html>
<html lang="fr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-NX6JWZPV');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reste. (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #10b981; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f9fa;
            @apply text-slate-900 antialiased min-h-screen overflow-x-hidden; 
        }

        .card-white {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            @apply rounded-[2rem] p-6 transition-all duration-300;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-primary {
            @apply bg-emerald-500 text-white py-5 rounded-[1.8rem] font-extrabold text-sm uppercase tracking-tighter transition-all active:scale-95 disabled:opacity-50 shadow-md shadow-emerald-500/10 hover:bg-emerald-600;
        }

        #ing-input, #search-input {
            @apply bg-slate-100 p-4 rounded-2xl border border-transparent focus:border-emerald-500 focus:bg-white transition-all outline-none text-slate-900 placeholder:text-slate-400;
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-36">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NX6JWZPV" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <nav class="fixed top-0 w-full z-50 px-8 py-5 flex justify-between items-center bg-white/80 backdrop-blur-xl border-b border-slate-100">
        <span class="text-2xl font-extrabold tracking-tighter italic uppercase text-slate-900">Reste<span class="text-emerald-500">.</span></span>
        <div id="auth-status"></div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-28">
        <section id="tab-explore" class="tab-content active space-y-8">
            <header class="flex justify-between items-end">
                <h2 class="text-4xl font-extrabold tracking-tight text-slate-900">Cuisinez vos <span class="text-emerald-500">restes.</span></h2>
                <div class="flex flex-col items-end">
                    <span class="text-[8px] font-black opacity-30 uppercase mb-1 text-slate-400">Trier par</span>
                    <select id="sort-filter" class="bg-transparent text-[10px] font-bold text-emerald-600 outline-none cursor-pointer">
                        <option value="recent">RÉCENTS</option>
                        <option value="random">MÉLANGE</option>
                    </select>
                </div>
            </header>

            <div class="card-white space-y-4">
                <p class="text-[10px] font-black uppercase tracking-widest text-emerald-600">Générateur IA</p>
                <input type="text" id="ing-input" placeholder="Ex: Poulet, riz, oignons...">
                <button id="ia-btn" class="w-full btn-primary">Publier la recette 🪄</button>
            </div>

            <div class="relative group">
                <input type="text" id="search-input" placeholder="Rechercher une recette ou un Chef..." class="w-full pl-12 bg-white border-slate-200">
                <svg class="w-5 h-5 absolute left-4 top-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div id="posts-feed" class="space-y-4 pb-10"></div>
        </section>

        <section id="tab-profile" class="tab-content space-y-6">
            <div class="flex flex-col items-center text-center space-y-4 py-4">
                <div id="profile-avatar"></div>
                <div>
                    <h2 id="profile-name" class="text-3xl font-extrabold tracking-tighter uppercase italic text-slate-900">...</h2>
                    <p id="level-name" class="text-emerald-600 text-[9px] font-black uppercase tracking-widest bg-emerald-50 px-4 py-1.5 rounded-full inline-block mt-2 border border-emerald-100">NIVEAU 1</p>
                </div>
            </div>

            <div class="card-white space-y-4">
                <div class="flex justify-between text-[10px] font-black uppercase tracking-widest text-slate-400">
                    <span>Expérience</span>
                    <span id="xp-text" class="text-slate-900">0 / 100 XP</span>
                </div>
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="xp-fill" class="h-full bg-emerald-500 transition-all duration-1000"></div>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 px-2">Styles d'avatar</p>
                <div id="avatar-selection" class="flex gap-3 overflow-x-auto pb-2 scroll-hide"></div>
            </div>
            
            <button id="logout-btn" class="w-full py-6 text-slate-300 font-bold text-[10px] uppercase tracking-widest hover:text-red-500">RÉINITIALISER</button>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[280px] bg-white p-2 rounded-full flex justify-between z-50 shadow-2xl border border-slate-100">
        <button onclick="window.switchTab('explore')" id="nav-explore" class="w-32 py-4 rounded-full bg-emerald-500 text-white flex justify-center shadow-lg transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.97 2.59a1.5 1.5 0 00-1.94 0l-7.5 6.363A1.5 1.5 0 003 10.097V19.5A1.5 1.5 0 004.5 21h4.75a.75.75 0 00.75-.75V14h4v6.25c0 .414.336.75.75.75h4.75a1.5 1.5 0 001.5-1.5v-9.403a1.5 1.5 0 00-.53-1.144l-7.5-6.363z"></path></svg>
        </button>
        <button onclick="window.switchTab('profile')" id="nav-profile" class="w-32 py-4 rounded-full text-slate-300 flex justify-center transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </button>
    </nav>

    <div id="share-toast" class="hidden"></div>

    <div id="login-modal" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-sm text-center">
            <h3 class="text-5xl font-black mb-8 italic uppercase tracking-tighter text-slate-900">Reste<span class="text-emerald-500">.</span></h3>
            <input type="text" id="user-name-input" placeholder="Ton pseudo" class="w-full bg-slate-100 p-6 rounded-[2rem] text-center font-bold text-xl text-slate-900 mb-4 outline-none focus:border-emerald-500 border-2 border-transparent transition-all">
            <button id="login-btn" class="w-full btn-primary shadow-xl">Commencer</button>
        </div>
    </div>

    <script>
        const LEVELS = [
            { min: 0, name: "Mitron", style: "avataaars" },
            { min: 100, name: "Commis", style: "bottts" },
            { min: 250, name: "Chef de Partie", style: "adventurer" },
            { min: 500, name: "Maître", style: "lorelei" }
        ];

        let state = JSON.parse(localStorage.getItem('reste_state')) || {
            user: null,
            xp: 0,
            style: 'avataaars',
            posts: []
        };

        if (!state.user) document.getElementById('login-modal').classList.remove('hidden');
        else initApp();

        function save() { localStorage.setItem('reste_state', JSON.stringify(state)); }

        function initApp() {
            updateUI();
            applyFilters();
            renderAvatarEditor();
        }

        document.getElementById('login-btn').onclick = () => {
            const name = document.getElementById('user-name-input').value.trim();
            if(!name) return;
            state.user = name;
            save();
            location.reload();
        };

        document.getElementById('ia-btn').onclick = () => {
            const input = document.getElementById('ing-input');
            if(!input.value.trim()) return;
            const newPost = {
                id: Date.now(),
                author: state.user,
                content: `Chef ${state.user} : ${input.value}. Recette générée !`,
                style: state.style,
                createdAt: new Date().toISOString()
            };
            state.posts.unshift(newPost);
            state.xp += 25;
            save();
            input.value = '';
            showToast("+25 XP !");
            updateUI();
            applyFilters();
        };

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-filter').value;
            let filtered = [...state.posts].filter(p => p.content.toLowerCase().includes(search) || p.author.toLowerCase().includes(search));
            if(sort === 'random') filtered.sort(() => Math.random() - 0.5);
            
            const feed = document.getElementById('posts-feed');
            if(filtered.length === 0) {
                feed.innerHTML = `<p class="text-center py-10 text-xs font-bold text-slate-300 uppercase">Aucune recette</p>`;
                return;
            }
            feed.innerHTML = filtered.map(post => `
                <div class="card-white">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <img src="https://api.dicebear.com/7.x/${post.style}/svg?seed=${post.author}" class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100">
                            <span class="text-xs font-bold text-slate-800">${post.author}</span>
                        </div>
                        <button onclick="deletePost(${post.id})" class="text-slate-300 hover:text-red-500 transition-colors p-2">🗑️</button>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed font-medium">${post.content}</p>
                </div>
            `).join('');
        }

        window.deletePost = (id) => {
            if(!confirm("Supprimer ?")) return;
            state.posts = state.posts.filter(p => p.id !== id);
            save();
            applyFilters();
        };

        window.changeAvatarStyle = (s) => {
            state.style = s;
            save();
            updateUI();
            renderAvatarEditor();
        };

        function updateUI() {
            const info = [...LEVELS].reverse().find(l => state.xp >= l.min);
            const next = LEVELS.find(l => l.min > state.xp) || { min: state.xp + 100 };
            const progress = ((state.xp - info.min) / (next.min - info.min)) * 100;
            const url = `https://api.dicebear.com/7.x/${state.style}/svg?seed=${state.user}`;
            
            document.getElementById('auth-status').innerHTML = `<img src="${url}" class="w-8 h-8 rounded-lg bg-slate-100 border border-slate-200">`;
            document.getElementById('profile-name').innerText = state.user;
            document.getElementById('profile-avatar').innerHTML = `<img src="${url}" class="w-24 h-24 rounded-[2rem] bg-white p-1 border border-slate-200 shadow-lg">`;
            document.getElementById('level-name').innerText = info.name;
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('xp-text').innerText = `${state.xp} / ${next.min} XP`;
        }

        function renderAvatarEditor() {
            let html = '';
            LEVELS.forEach(level => {
                const isLocked = state.xp < level.min;
                html += `<div onclick="${isLocked ? '' : `window.changeAvatarStyle('${level.style}')`}" class="flex-shrink-0 cursor-pointer">
                    <img src="https://api.dicebear.com/7.x/${level.style}/svg?seed=${state.user}" class="w-16 h-16 rounded-2xl bg-white p-1 border-2 ${state.style === level.style ? 'border-emerald-500' : 'border-slate-100'} ${isLocked ? 'grayscale opacity-20' : ''}">
                </div>`;
            });
            document.getElementById('avatar-selection').innerHTML = html;
        }

        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            const exploreBtn = document.getElementById('nav-explore');
            const profileBtn = document.getElementById('nav-profile');
            if(t === 'explore') {
                exploreBtn.className = "w-32 py-4 rounded-full bg-emerald-500 text-white flex justify-center shadow-lg transition-all";
                profileBtn.className = "w-32 py-4 rounded-full text-slate-300 flex justify-center transition-all";
            } else {
                profileBtn.className = "w-32 py-4 rounded-full bg-emerald-500 text-white flex justify-center shadow-lg transition-all";
                exploreBtn.className = "w-32 py-4 rounded-full text-slate-300 flex justify-center transition-all";
            }
        };

        function showToast(m) { 
            const t = document.getElementById('share-toast'); t.innerText = m; 
            t.className = "fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full font-bold text-xs uppercase z-[100]"; 
            setTimeout(() => t.className = "hidden", 2000); 
        }

        document.getElementById('search-input').oninput = applyFilters;
        document.getElementById('sort-filter').onchange = applyFilters;
        document.getElementById('logout-btn').onclick = () => { if(confirm("Tout effacer ?")) { localStorage.clear(); location.reload(); }};
    </script>
</body>
</html>
