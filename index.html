<div class="bento-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span id="level-name" style="font-weight:bold; color:var(--accent);">Mitron</span>
        <span id="xp-text" style="font-size:12px; opacity:0.6;">0 / 100 XP</span>
    </div>
    <div style="width:100%; height:8px; background:var(--card-border); border-radius:10px; overflow:hidden;">
        <div id="xp-progress" style="width:0%; height:100%; background:var(--accent); transition:0.5s;"></div>
    </div>
</div>
