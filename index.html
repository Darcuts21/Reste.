<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reste.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #10b981;
            --card-bg: #111111;
            --border: rgba(255, 255, 255, 0.08);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            @apply bg-[#050505] text-zinc-100 antialiased; 
        }
        .bento-card { 
            background: var(--card-bg);
            border: 1px solid var(--border);
            @apply rounded-[2.5rem] p-6 mb-4 transition-all duration-300;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Avatar System */
        .avatar-option { @apply cursor-pointer transition-all active:scale-90; }
        .avatar-locked { @apply opacity-20 grayscale cursor-not-allowed; }
        
        /* XP Bar */
        .xp-bar-container { @apply w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden mt-3; }
        .xp-fill { @apply h-full bg-emerald-500 transition-all duration-1000 ease-out; }

        #share-toast { 
            @apply fixed bottom-28 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-3 rounded-full font-bold text-sm shadow-2xl transition-all duration-500 translate-y-20 opacity-0 z-[100]; 
        }
        #share-toast.show { @apply translate-y-0 opacity-100; }
    </style>
</head>
<body class="pb-32">

    <nav class="sticky top-0 z-50 px-8 py-6 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5">
        <h1 class="text-2xl font-extrabold tracking-tighter">Reste<span class="text-emerald-500">.</span></h1>
        <div id="auth-status"></div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-8">

        <section id="tab-explore" class="tab-content active space-y-6">
            <div class="bento-card bg-emerald-500 !border-none text-white shadow-xl shadow-emerald-500/10">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] mb-4 opacity-70">Générateur IA • +25 XP</p>
                <input type="text" id="ing-input" placeholder="Oignons, pain sec..." 
                       class="w-full bg-transparent text-2xl font-bold placeholder:text-emerald-100 outline-none mb-6">
                <button onclick="handleAskIA()" id="ia-btn" class="w-full bg-white text-emerald-600 py-4 rounded-3xl font-bold text-sm shadow-lg active:scale-95 transition-all">
                    Publier la recette 🪄
                </button>
            </div>
            
            <div id="posts-feed" class="space-y-4"></div>
        </section>

        <section id="tab-profile" class="tab-content space-y-6">
            <div class="bento-card flex items-center gap-6">
                <div id="profile-avatar" class="relative"></div>
                <div>
                    <h2 id="profile-name" class="text-2xl font-bold">Chef</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="level-name" class="text-emerald-500 text-[10px] font-bold uppercase tracking-widest">Niveau 1</span>
                        <span class="text-zinc-600 text-[10px]">•</span>
                        <span id="xp-text" class="text-zinc-500 text-[10px] font-bold">0 / 100 XP</span>
                    </div>
                </div>
            </div>

            <div class="bento-card">
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-30 mb-4">Progression</p>
                <div class="xp-bar-container"><div id="xp-fill" class="xp-fill" style="width: 0%"></div></div>
            </div>

            <div class="bento-card">
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-30 mb-6">Éditeur d'avatar</p>
                <div id="avatar-selection" class="flex gap-5 overflow-x-auto pb-4 scroll-hide"></div>
            </div>

            <div id="my-posts-feed" class="space-y-4 pt-4 border-t border-white/5"></div>
            
            <button onclick="handleLogout()" class="w-full py-6 text-zinc-600 font-bold text-[10px] uppercase tracking-widest hover:text-red-500 transition-colors">
                Déconnexion
            </button>
        </section>

    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-sm bg-zinc-900/90 backdrop-blur-2xl rounded-full p-2 flex justify-around border border-white/10 shadow-2xl z-50">
        <button onclick="switchTab('explore')" id="nav-explore" class="p-4 text-emerald-500 transition-all"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.97 2.59a1.5 1.5 0 00-1.94 0l-7.5 6.363A1.5 1.5 0 003 10.097V19.5A1.5 1.5 0 004.5 21h4.75a.75.75 0 00.75-.75V14h4v6.25c0 .414.336.75.75.75h4.75a1.5 1.5 0 001.5-1.5v-9.403a1.5 1.5 0 00-.53-1.144l-7.5-6.363z"></path></svg></button>
        <button onclick="switchTab('profile')" id="nav-profile" class="p-4 opacity-20 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
    </div>

    <div id="share-toast">Recette publiée ! ✨</div>

    <div id="login-modal" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-8">
        <div class="bento-card w-full max-w-sm text-center !p-12 border-none">
            <h3 class="text-4xl font-black mb-2 tracking-tighter">Reste<span class="text-emerald-500">.</span></h3>
            <p class="text-zinc-500 text-sm mb-10">Cuisinez vos restes avec l'IA.</p>
            <input type="text" id="user-name-input" placeholder="Pseudo" class="w-full p-5 rounded-3xl bg-zinc-900 border border-white/5 outline-none mb-4 text-center font-bold text-lg focus:border-emerald-500/50 transition-all">
            <button onclick="finalizeLogin()" class="w-full bg-emerald-500 text-white py-5 rounded-3xl font-bold shadow-xl shadow-emerald-500/20 active:scale-95 transition-all">Rejoindre le club</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        let currentUser = localStorage.getItem('reste_user') || null;
        let userStyle = localStorage.getItem('reste_style') || 'avataaars';
        let userXP = parseInt(localStorage.getItem('reste_xp')) || 0;
        let posts = JSON.parse(localStorage.getItem('reste_posts')) || [
            { id: 1, author: 'Sacha', content: 'Velouté de fanes de carottes au cumin. 🥕', style: 'avataaars', likes: 12, liked: false },
            { id: 2, author: 'Léa', content: 'Pain perdu salé au vieux comté.', style: 'avataaars', likes: 8, liked: false }
        ];

        const LEVELS = [
            { min: 0, name: "Mitron", icon: "🥚", style: "avataaars" },
            { min: 100, name: "Commis", icon: "🔪", style: "bottts" },
            { min: 250, name: "Chef de Partie", icon: "👨‍🍳", style: "adventurer" },
            { min: 500, name: "Maître de Reste.", icon: "🌟", style: "lorelei" }
        ];

        // --- CORE ---
        document.addEventListener('DOMContentLoaded', () => {
            if (!currentUser) document.getElementById('login-modal').classList.remove('hidden');
            else {
                document.getElementById('login-modal').style.display = 'none';
                updateUI();
            }
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('button[id^="nav-"]').forEach(b => b.classList.replace('text-emerald-500', 'opacity-20'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.replace('opacity-20', 'text-emerald-500');
            
            if(tabId === 'profile') { renderMyPosts(); renderAvatarEditor(); }
            if(tabId === 'explore') renderFeed('posts-feed', posts);
        }

        function updateUI() {
            const info = [...LEVELS].reverse().find(l => userXP >= l.min);
            const nextLevel = LEVELS.find(l => l.min > userXP) || { min: userXP + 100 };
            const progress = ((userXP - info.min) / (nextLevel.min - info.min)) * 100;

            const avatarUrl = `https://api.dicebear.com/7.x/${userStyle}/svg?seed=${currentUser}`;
            document.getElementById('auth-status').innerHTML = `<img src="${avatarUrl}" class="w-9 h-9 rounded-xl bg-zinc-800 border border-white/5 shadow-inner">`;
            document.getElementById('profile-name').innerHTML = `${currentUser} <span class="opacity-30 text-lg">${info.icon}</span>`;
            document.getElementById('profile-avatar').innerHTML = `<img src="${avatarUrl}" class="w-24 h-24 rounded-[2rem] bg-zinc-900 border border-white/10 shadow-2xl">`;
            
            document.getElementById('level-name').innerText = info.name;
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('xp-text').innerText = `${userXP} / ${nextLevel.min} XP`;

            renderFeed('posts-feed', posts);
        }

        function renderAvatarEditor() {
            let html = '';
            LEVELS.forEach(level => {
                const isLocked = userXP < level.min;
                html += `
                    <div onclick="${isLocked ? '' : `changeAvatarStyle('${level.style}')`}" class="avatar-option flex-shrink-0">
                        <img src="https://api.dicebear.com/7.x/${level.style}/svg?seed=${currentUser}" 
                             class="w-16 h-16 rounded-2xl bg-zinc-900 border-2 ${userStyle === level.style ? 'border-emerald-500' : 'border-transparent'} ${isLocked ? 'grayscale opacity-20' : ''}">
                        ${isLocked ? `<p class="text-[7px] text-center mt-2 font-bold opacity-30 uppercase">${level.min} XP</p>` : ''}
                    </div>`;
            });
            document.getElementById('avatar-selection').innerHTML = html;
        }

        async function handleAskIA() {
            const input = document.getElementById('ing-input');
            const btn = document.getElementById('ia-btn');
            if (!input.value.trim()) return;

            btn.disabled = true;
            btn.innerText = "Calcul culinaire...";

            setTimeout(() => {
                const newPost = {
                    id: Date.now(),
                    author: currentUser,
                    style: userStyle,
                    content: `Chef ${currentUser} recommande : Un mélange de ${input.value} poêlé minute.`,
                    likes: 0, liked: false
                };
                posts.unshift(newPost);
                userXP += 25;
                localStorage.setItem('reste_xp', userXP);
                localStorage.setItem('reste_posts', JSON.stringify(posts));
                
                input.value = '';
                btn.disabled = false;
                btn.innerText = "Publier la recette 🪄";
                updateUI();
                showToast("+25 XP • Recette publiée ! ✨");
            }, 1000);
        }

        function renderFeed(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(post => `
                <div class="bento-card !bg-[#0c0c0c]">
                    <div class="flex justify-between items-start mb-5">
                        <div class="flex items-center gap-3">
                            <img src="https://api.dicebear.com/7.x/${post.style || 'avataaars'}/svg?seed=${post.author}" class="w-8 h-8 rounded-lg bg-zinc-800">
                            <span class="text-xs font-bold tracking-tight">${post.author}</span>
                        </div>
                        ${post.author === currentUser ? `<button onclick="deletePost(${post.id})" class="p-2 opacity-20 hover:opacity-100 text-red-500 transition-all">🗑️</button>` : ''}
                    </div>
                    <p class="text-sm leading-relaxed opacity-80 mb-6">${post.content}</p>
                    <div class="flex gap-4">
                        <button onclick="toggleLike(${post.id})" class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 transition-colors text-[10px] font-bold ${post.liked ? 'text-emerald-500' : 'text-zinc-500'}">
                            <svg class="w-4 h-4" fill="${post.liked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                            ${post.likes}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleLike(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.liked ? post.likes-- : post.likes++;
                post.liked = !post.liked;
                localStorage.setItem('reste_posts', JSON.stringify(posts));
                updateUI();
            }
        }

        function deletePost(id) {
            if(!confirm("Supprimer cette recette ?")) return;
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('reste_posts', JSON.stringify(posts));
            updateUI();
            if(document.getElementById('tab-profile').classList.contains('active')) renderMyPosts();
        }

        function changeAvatarStyle(s) {
            userStyle = s;
            localStorage.setItem('reste_style', s);
            updateUI();
            renderAvatarEditor();
        }

        function finalizeLogin() {
            const n = document.getElementById('user-name-input').value.trim();
            if (n) {
                currentUser = n;
                localStorage.setItem('reste_user', n);
                document.getElementById('login-modal').style.display = 'none';
                updateUI();
            }
        }

        function renderMyPosts() { renderFeed('my-posts-feed', posts.filter(p => p.author === currentUser)); }
        function showToast(m) { const t = document.getElementById('share-toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function handleLogout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
