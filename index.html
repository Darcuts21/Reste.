<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTE • Social Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAx8-qibToAur16FIWLd_Yc9HXQlwJoe3A",
            authDomain: "reste-95f7b.firebaseapp.com",
            projectId: "reste-95f7b",
            storageBucket: "reste-95f7b.firebasestorage.app",
            messagingSenderId: "667568129281",
            appId: "1:667568129281:web:d03358f9976699425d4700",
            measurementId: "G-11ML0LP6Z1"
        };

        const GEMINI_API_KEY = "TA_CLE_GEMINI_ICI";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- GESTION DU THÈME ---
        window.toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // --- AUTHENTIFICATION ---
        window.login = () => signInWithPopup(auth, provider).catch(console.error);
        window.logout = () => signOut(auth);
        
        onAuthStateChanged(auth, (user) => {
            const authSection = document.getElementById('auth-section');
            const welcome = document.getElementById('user-welcome');
            const inputArea = document.getElementById('input-area');

            if (user) {
                authSection.innerHTML = `
                    <button onclick="logout()" class="flex items-center space-x-2 bg-zinc-100 dark:bg-zinc-800 p-1 pr-3 rounded-full transition-all active:scale-95">
                        <img src="${user.photoURL}" class="w-7 h-7 rounded-full">
                        <span class="text-[10px] font-bold uppercase tracking-tight">Déconnexion</span>
                    </button>`;
                welcome.innerText = `Salut, ${user.displayName.split(' ')[0]} !`;
                inputArea.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                authSection.innerHTML = `
                    <button onclick="login()" class="bg-black dark:bg-white dark:text-black text-white text-[10px] font-bold px-5 py-2 rounded-full uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                        Se connecter
                    </button>`;
                welcome.innerText = `Bienvenue !`;
                inputArea.classList.add('opacity-50', 'pointer-events-none');
            }
        });

        // --- LOGIQUE IA & FIRESTORE ---
        window.askIA = async () => {
            const ing = document.getElementById('ing-input').value;
            if (!ing) return;

            const btn = document.getElementById('ia-submit');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Création...</span>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chef anti-gaspi: Propose une recette très courte (Titre + 3 étapes) avec : ${ing}.` }]}]
                    })
                });
                const data = await response.json();
                const recipeText = data.candidates[0].content.parts[0].text;

                await addDoc(collection(db, "posts"), {
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    ingredients: ing,
                    recipe: recipeText,
                    createdAt: new Date()
                });
                document.getElementById('ing-input').value = "";
            } catch (e) {
                alert("Erreur IA : Vérifie ta clé Gemini.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Générer la recette 🪄`;
            }
        };

        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('posts-list');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                container.innerHTML += `
                    <div class="mb-6 bg-white dark:bg-zinc-900 p-6 rounded-[2rem] border border-zinc-100 dark:border-zinc-800 shadow-sm animate-fade-in">
                        <div class="flex items-center space-x-3 mb-4">
                            <img src="${post.userPhoto}" class="w-5 h-5 rounded-full">
                            <span class="text-[11px] font-semibold opacity-70">${post.userName}</span>
                        </div>
                        <p class="text-[9px] uppercase tracking-widest text-emerald-600 dark:text-emerald-400 font-bold mb-2">Restes : ${post.ingredients}</p>
                        <div class="text-sm leading-relaxed opacity-90 whitespace-pre-line">${post.recipe}</div>
                    </div>`;
            });
        });
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; transition: background-color 0.3s ease; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease forwards; }
        input::placeholder { opacity: 0.3; }
    </style>
</head>
<body class="bg-[#fafafa] dark:bg-black text-black dark:text-white pb-28">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-black/80 ios-blur px-6 py-4 flex justify-between items-center border-b border-zinc-100 dark:border-zinc-900">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-bold tracking-tighter italic">Reste.</h1>
            <button onclick="toggleTheme()" class="p-2 bg-zinc-100 dark:bg-zinc-800 rounded-full transition-colors">
                <svg class="w-4 h-4 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                <svg class="w-4 h-4 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
        <div id="auth-section"></div>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <div class="py-10">
            <h2 id="user-welcome" class="text-3xl font-semibold tracking-tight mb-2">Bienvenue !</h2>
            <p class="text-[10px] opacity-40 uppercase tracking-[0.2em] font-bold">L'intelligence anti-gaspi.</p>
        </div>

        <div id="input-area" class="mb-14 transition-opacity duration-500">
            <div class="bg-zinc-900 dark:bg-white p-8 rounded-[3rem] shadow-2xl overflow-hidden relative">
                <div class="relative z-10">
                    <input type="text" id="ing-input" placeholder="Tes restes de frigo..." 
                           class="bg-transparent border-b border-white/20 dark:border-black/10 w-full py-4 mb-6 outline-none text-xl font-light text-white dark:text-black">
                    <button id="ia-submit" onclick="askIA()" class="w-full bg-emerald-500 text-white py-4 rounded-[1.5rem] font-bold transition-all active:scale-95 shadow-lg shadow-emerald-500/20">
                        Générer la recette 🪄
                    </button>
                </div>
            </div>
            <p class="text-[9px] text-center mt-4 opacity-30 uppercase tracking-tighter">Connecte-toi pour publier sur le flux</p>
        </div>

        <div class="flex items-center space-x-4 mb-8">
            <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-30 whitespace-nowrap">Derniers sauvetages</h3>
            <div class="h-[1px] w-full bg-zinc-200 dark:bg-zinc-800"></div>
        </div>

        <div id="posts-list" class="space-y-6">
            <div class="text-center py-20 opacity-10 text-[10px] uppercase tracking-widest">Initialisation...</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-xs bg-white/70 dark:bg-zinc-900/70 border border-zinc-200 dark:border-zinc-800 rounded-full py-4 px-10 flex justify-between items-center shadow-2xl ios-blur transition-colors">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="opacity-100"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.97 2.59a1.5 1.5 0 00-1.94 0l-7.5 6.363A1.5 1.5 0 003 10.097V19.5A1.5 1.5 0 004.5 21h4.75a.75.75 0 00.75-.75V14h4v6.25c0 .414.336.75.75.75h4.75a1.5 1.5 0 001.5-1.5v-9.403a1.5 1.5 0 00-.53-1.144l-7.5-6.363z"></path></svg></button>
        <button class="opacity-30"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
        <button class="opacity-30"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
    </div>

</body>
</html>
